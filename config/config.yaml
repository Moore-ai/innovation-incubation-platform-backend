server:
  port: ${SERVER_PORT}
  mode: ${SERVER_MODE}

db:
  host: ${DB_HOST}
  port: ${DB_PORT}
  user: ${DB_USER}
  password: ${DB_PASSWORD}
  name: ${DB_NAME}
  sslmode: disable

jwt:
  secret: ${JWT_SECRET}
  expire_hours: 24

casbin:
  model_path: config/casbin_model.conf

ai:
  provider: anthropic
  anthropic:
    api_key: ${AI_API_KEY}
    base_url: ${AI_BASE_URL}
    model: claude-sonnet-4-6
    timeout_seconds: 30
  prompts:
    extract: "你是政策分析专家。从以下政策内容中提取关键结构化信息，只返回 JSON。"
    match: "你是政策匹配分析师。按步骤推理：行业→规模→综合，返回 JSON。"
    prefill: "你是表单预填充助手。根据企业信息和历史申报数据填充表单，只返回 JSON。"

redis:
  addr: ${REDIS_ADDR}
  password: ""
  db: ${REDIS_DB}

upload:
  max_size_mb: 2

rate_limit:
  enabled: true
  algorithm: token_bucket
  default_rpm: 60
  whitelist: []
