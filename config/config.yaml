server:
  port: ${SERVER_PORT}
  mode: ${SERVER_MODE}

db:
  host: ${DB_HOST}
  port: ${DB_PORT}
  user: ${DB_USER}
  password: ${DB_PASSWORD}
  name: ${DB_NAME}
  sslmode: disable

jwt:
  secret: ${JWT_SECRET}
  expire_hours: 24

casbin:
  model_path: config/casbin_model.conf

ai:
  provider: anthropic
  anthropic:
    api_key: ${AI_API_KEY}
    base_url: ${AI_BASE_URL}
    model: claude-sonnet-4-6
    timeout_seconds: 30

redis:
  addr: ${REDIS_ADDR}
  password: ""
  db: ${REDIS_DB}

upload:
  max_size_mb: 2

rate_limit:
  enabled: true
  algorithm: token_bucket
  default_rpm: 60
  whitelist: []
