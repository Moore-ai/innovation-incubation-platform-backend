server:
  port: ${SERVER_PORT}
  mode: ${SERVER_MODE}

db:
  host: ${DB_HOST}
  port: ${DB_PORT}
  user: ${DB_USER}
  password: ${DB_PASSWORD}
  name: ${DB_NAME}
  sslmode: disable

jwt:
  secret: ${JWT_SECRET}
  expire_hours: 24

ai:
  provider: anthropic
  openai:
    api_key: ${AI_API_KEY}
    base_url: ${AI_BASE_URL}
    model: ${AI_MODEL}
    timeout_seconds: 30

redis:
  addr: ${REDIS_ADDR}
  password: ""
  db: ${REDIS_DB}

upload:
  max_size_mb: 2
  dir: uploads
  allowed_extensions: []

rate_limit:
  enabled: true
  algorithm: token_bucket
  default_rpm: 60
  whitelist: []

log:
  enabled: false

notification:
  heartbeat_seconds: 30
  recent_count: 20
  max_conns_per_user: 10

filematch:
  weight_jaro: 0.4
  weight_keyword: 0.4
  weight_prefix: 0.2
  threshold: 0.6
